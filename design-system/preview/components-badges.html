<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: oklch(11% 0.012 240); font-family: 'Inter', sans-serif; padding: 16px; }
  .row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
  .row-label { font-size: 10px; font-weight: 600; letter-spacing: 0.09em; text-transform: uppercase; color: oklch(44% 0.012 240); width: 90px; flex-shrink: 0; }
  .badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 9999px; font-family: 'JetBrains Mono', monospace; }
  .b-green  { background: oklch(68% 0.19 145 / 0.15); color: oklch(78% 0.17 145); border: 1px solid oklch(68% 0.19 145 / 0.35); }
  .b-red    { background: oklch(60% 0.22 25 / 0.15);  color: oklch(70% 0.2 25);   border: 1px solid oklch(60% 0.22 25 / 0.35); }
  .b-amber  { background: oklch(78% 0.18 75 / 0.15);  color: oklch(78% 0.18 75);  border: 1px solid oklch(78% 0.18 75 / 0.35); }
  .b-teal   { background: oklch(72% 0.145 195 / 0.15);color: oklch(72% 0.145 195);border: 1px solid oklch(72% 0.145 195 / 0.35); }
  .b-blue   { background: oklch(65% 0.155 250 / 0.15);color: oklch(72% 0.14 250); border: 1px solid oklch(65% 0.155 250 / 0.35); }
  .b-neutral{ background: oklch(20% 0.018 240);       color: oklch(65% 0.012 240);border: 1px solid oklch(32% 0.022 240); }

  .chip { display: inline-flex; align-items: center; gap: 5px; background: oklch(20% 0.018 240); border: 1px solid oklch(32% 0.022 240); border-radius: 5px; padding: 3px 10px; font-size: 12px; font-weight: 500; color: oklch(94% 0.005 240); }
  .chip-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

  .prefix-tag { display: inline-flex; align-items: center; gap: 0; font-family: 'JetBrains Mono', monospace; font-size: 12px; overflow: hidden; border-radius: 4px; border: 1px solid oklch(26% 0.02 240); }
  .prefix-tag .pre { padding: 3px 8px; font-weight: 600; }
  .prefix-tag .body { padding: 3px 10px; background: oklch(20% 0.018 240); color: oklch(94% 0.005 240); }
  .opt-tag .pre { background: oklch(78% 0.18 75 / 0.15); color: oklch(78% 0.18 75); }
  .bac-tag .pre { background: oklch(72% 0.145 195 / 0.15); color: oklch(72% 0.145 195); }
  .ar-tag  .pre { background: oklch(65% 0.155 250 / 0.15); color: oklch(72% 0.14 250); }
</style>
</head>
<body>
  <div class="row"><span class="row-label">Status</span>
    <span class="badge b-green">Shortlisted</span>
    <span class="badge b-red">Rejected</span>
    <span class="badge b-amber">Running</span>
    <span class="badge b-teal">Loaded</span>
    <span class="badge b-blue">OOS Passed</span>
    <span class="badge b-neutral">Excluded</span>
  </div>
  <div class="row"><span class="row-label">Param chips</span>
    <span class="chip"><span class="chip-dot" style="background:oklch(78% 0.18 75)"></span>Entry: 3 groups</span>
    <span class="chip"><span class="chip-dot" style="background:oklch(68% 0.19 145)"></span>Stop: included</span>
    <span class="chip"><span class="chip-dot" style="background:oklch(60% 0.22 25 / 0.8)"></span>HTF: excluded</span>
  </div>
  <div class="row"><span class="row-label">Run labels</span>
    <span class="prefix-tag opt-tag"><span class="pre">OPT</span><span class="body">Entry sweep — 2026-04-09 14:30</span></span>
  </div>
  <div class="row"><span class="row-label"></span>
    <span class="prefix-tag bac-tag"><span class="pre">BAC</span><span class="body">OOS validation — 2026-04-10 09:15</span></span>
  </div>
  <div class="row"><span class="row-label"></span>
    <span class="prefix-tag ar-tag"><span class="pre">AR</span><span class="body">Autoresearch gen 42 — 2026-04-11 11:00</span></span>
  </div>
</body>
</html>
